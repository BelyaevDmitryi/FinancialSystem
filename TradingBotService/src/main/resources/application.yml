server:
  port: 8007

spring:
  application:
    name: trading-bot-service
  cloud:
    loadbalancer:
      enabled: true
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DATABASE:botdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
  file:
    name: logs/TradingBotService.log

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: trading-bot-service
    status-page-url: http://trading-bot-service:8007/actuator/info
    health-check-url: http://trading-bot-service:8007/actuator/health
    home-page-url: http://trading-bot-service:8007/
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    app:
      name: ${spring.application.name}
      description: Trading Bot Service for Financial System

springdoc:
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}

bot:
  candle-lookback: 30  # ≥26 для MACD
  candle-interval: DAY
  scheduler:
    fixed-delay: ${BOT_SCHEDULER_FIXED_DELAY:60000}  # 1 минута (тест: 10000)

fs:
  bot:
    default-paper: true

# RM2 (P1+): при enabled=true DelegatingCandleHistoryProvider сначала запрашивает MarketHistoryService.
market-history:
  candles:
    enabled: false
