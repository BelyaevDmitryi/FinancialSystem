server:
  port: 8011

spring:
  application:
    name: bot-optimization-service
  cloud:
    loadbalancer:
      enabled: true

logging:
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: bot-optimization-service
    status-page-url: http://bot-optimization-service:8011/actuator/info
    health-check-url: http://bot-optimization-service:8011/actuator/health
    home-page-url: http://bot-optimization-service:8011/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
