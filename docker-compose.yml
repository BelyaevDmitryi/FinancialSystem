services:
  eureka-server:
    build:
      context: ./EurekaServer
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    networks:
      - financial-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  api-gateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      price-service:
        condition: service_started
      broker-integration-service:
        condition: service_started
      analytics-service:
        condition: service_started
      trading-terminal-service:
        condition: service_started
      trading-bot-service:
        condition: service_started
      admin-panel-service:
        condition: service_started
      dashboard-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8001:8001"
      - "8091:8091"
    environment:
      SERVER_PORT: 8001
      MANAGEMENT_SERVER_PORT: 8091
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: stockDB
      API_PRICE_SERVICE_CONFIG_PRICE_SERVICE: http://price-service:8003
      API_BROKER_CONFIG_BROKER_INTEGRATION_SERVICE: http://broker-integration-service:8004
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      mongodb:
        condition: service_started
      broker-integration-service:
        condition: service_started
      price-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    networks:
      - financial-network
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  broker-integration-service:
    build:
      context: ./BrokerIntegrationService
      dockerfile: Dockerfile
    container_name: broker-integration-service
    ports:
      - "8004:8004"
    environment:
      SERVER_PORT: 8004
      TBANK_TOKEN: ${TBANK_TOKEN}
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  price-service:
    build:
      context: ./PriceService
      dockerfile: Dockerfile
    container_name: price-service
    ports:
      - "8003:8003"
    environment:
      SERVER_PORT: 8003
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7.0-alpine    # Или актуальная версия Redis
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - financial-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-service:
    build:
      context: ./AnalyticsService
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "8005:8005"
    environment:
      SERVER_PORT: 8005
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: analyticsDB
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      mongodb:
        condition: service_started
      price-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  trading-terminal-service:
    build:
      context: ./TradingTerminalService
      dockerfile: Dockerfile
    container_name: trading-terminal-service
    ports:
      - "8006:8006"
    environment:
      SERVER_PORT: 8006
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: tradingDB
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      mongodb:
        condition: service_started
      price-service:
        condition: service_started
      user-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  trading-bot-service:
    build:
      context: ./TradingBotService
      dockerfile: Dockerfile
    container_name: trading-bot-service
    ports:
      - "8007:8007"
    environment:
      SERVER_PORT: 8007
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: botDB
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      mongodb:
        condition: service_started
      analytics-service:
        condition: service_started
      trading-terminal-service:
        condition: service_started
      price-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-panel-service:
    build:
      context: ./AdminPanelService
      dockerfile: Dockerfile
    container_name: admin-panel-service
    ports:
      - "8008:8008"
    environment:
      SERVER_PORT: 8008
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      trading-terminal-service:
        condition: service_started
      trading-bot-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard-service:
    build:
      context: ./DashboardService
      dockerfile: Dockerfile
    container_name: dashboard-service
    ports:
      - "8009:8009"
    environment:
      SERVER_PORT: 8009
    networks:
      - financial-network
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      price-service:
        condition: service_started
      trading-terminal-service:
        condition: service_started
      trading-bot-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  financial-network:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
