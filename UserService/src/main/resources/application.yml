server:
  port: 8001

spring:
  application:
    name: user-service
  cloud:
    loadbalancer:
      enabled: true
  data:
    mongodb:
      host: ${SPRING_DATA_MONGODB_HOST:localhost}
      port: 27017
      database: stockDB
    rest:
      basePath: /datarest

springdoc:
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
  file:
    name: logs/UserService.log

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true
  info:
    env:
      enabled: true
    app:
      name: ${spring.application.name}
      description: User Service for Financial System

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: user-service
    status-page-url: http://localhost:8001/actuator/info
    health-check-url: http://localhost:8001/actuator/health
    home-page-url: http://localhost:8001/
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  expiration: 86400000  # 24 hours in milliseconds

data:
  rest:
    basePath: /datarest
