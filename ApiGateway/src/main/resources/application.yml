server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service routes
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0

        - id: user-service-stocks
          uri: lb://user-service
          predicates:
            - Path=/api/stocks/**
          filters:
            - StripPrefix=0

        - id: user-service-statistic
          uri: lb://user-service
          predicates:
            - Path=/api/statistic/**
          filters:
            - StripPrefix=0

        # Price Service routes
        - id: price-service
          uri: lb://price-service
          predicates:
            - Path=/api/price-service/**
          filters:
            - StripPrefix=1

        # Broker Integration Service routes
        - id: broker-integration-service
          uri: lb://broker-integration-service
          predicates:
            - Path=/api/broker/**
          filters:
            - StripPrefix=1

        # Analytics Service routes
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1

        # Trading Terminal Service routes
        - id: trading-terminal-service
          uri: lb://trading-terminal-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        # Trading Bot Service routes
        - id: trading-bot-service
          uri: lb://trading-bot-service
          predicates:
            - Path=/api/bots/**
          filters:
            - StripPrefix=1

        # Admin Panel Service routes
        - id: admin-panel-service
          uri: lb://admin-panel-service
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1

        # Dashboard Service routes
        - id: dashboard-service
          uri: lb://dashboard-service
          predicates:
            - Path=/api/dashboard/**
          filters:
            - StripPrefix=1

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: api-gateway
    status-page-url: http://localhost:8090/actuator/info
    health-check-url: http://localhost:8090/actuator/health
    home-page-url: http://localhost:8090/
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

