spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///tradingdb
    username: postgres
    password: postgres
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  task:
    scheduling:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

spring.cloud.openfeign.client.config:
  broker-integration-service:
    url: http://localhost:9999
  user-service:
    url: http://localhost:9999

broker:
  integration:
    enabled: false
  default-account-id: "test-account"

jwt:
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

logging:
  level:
    com.fs: DEBUG
