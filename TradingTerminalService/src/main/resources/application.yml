server:
  port: 8006

spring:
  application:
    name: trading-terminal-service
  cloud:
    loadbalancer:
      enabled: true
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DATABASE:tradingdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
  file:
    name: logs/TradingTerminalService.log

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: trading-terminal-service
    status-page-url: http://trading-terminal-service:8006/actuator/info
    health-check-url: http://trading-terminal-service:8006/actuator/health
    home-page-url: http://trading-terminal-service:8006/
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    app:
      name: ${spring.application.name}
      description: Trading Terminal Service for Financial System

springdoc:
  api-docs:
    path: /api-docs

# Тот же JWT_SECRET, что в UserService и ApiGateway (для проверки токена)
jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}

# В продакшене НЕ задавайте BROKER_ACCOUNT_ID — счёт берётся из UserService по X-User-Id (свой счёт у брокера для каждого пользователя).
broker:
  default-account-id: ${BROKER_ACCOUNT_ID:}
  integration:
    enabled: ${BROKER_INTEGRATION_ENABLED:true}
