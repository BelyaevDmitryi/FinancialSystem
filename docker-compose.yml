version: '3.8'

services:
  eureka-server:
    build:
      context: ./EurekaServer
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  api-gateway:
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      stock-service:
        condition: service_started
      price-service:
        condition: service_started
      tinkoff-stock-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8001:8001"
      - "8091:8091"
    environment:
      SERVER_PORT: 8001
      MANAGEMENT_SERVER_PORT: 8091
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: stockDB
      API_PRICE_SERVICE_CONFIG_PRICE_SERVICE: http://price-service:8003
      API_STOCK_CONFIG_STOCK_SERVICE: http://stock-service:8002
    depends_on:
      eureka-server:
        condition: service_started
      mongodb:
        condition: service_started
      stock-service:
        condition: service_started
      price-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  tinkoff-stock-service:
    build:
      context: ./TinkoffStockService
      dockerfile: Dockerfile
    container_name: tinkoff-stock-service
    ports:
      - "8004:8004"
    environment:
      SERVER_PORT: 8004
      STOCK_SERVICE_URL: http://stock-service:8002
    depends_on:
      eureka-server:
        condition: service_started
      stock-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  price-service:
    build:
      context: ./PriceService
      dockerfile: Dockerfile
    container_name: price-service
    ports:
      - "8003:8003"
    environment:
      SERVER_PORT: 8003
      STOCK_SERVICE_URL: http://stock-service:8002
    depends_on:
      eureka-server:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7.0-alpine    # Или актуальная версия Redis
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  stock-service:
    build:
      context: ./StockService
      dockerfile: Dockerfile
    container_name: stock-service
    ports:
      - "8002:8002"
    environment:
      SERVER_PORT: 8002
    depends_on:
      eureka-server:
        condition: service_started
      mongodb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  redis_data:
  mongo_data:
