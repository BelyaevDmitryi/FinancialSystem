server:
  port: 8008

spring:
  application:
    name: admin-panel-service
  cloud:
    loadbalancer:
      enabled: true

logging:
  level:
    root: INFO
  file:
    name: logs/AdminPanelService.log

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: admin-panel-service
    status-page-url: http://admin-panel-service:8008/actuator/info
    health-check-url: http://admin-panel-service:8008/actuator/health
    home-page-url: http://admin-panel-service:8008/
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    app:
      name: ${spring.application.name}
      description: Admin Panel Service for Financial System

springdoc:
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
