server:
  port: 8005

spring:
  application:
    name: analytics-service
  cloud:
    loadbalancer:
      enabled: true

logging:
  level:
    root: INFO
  file:
    name: logs/AnalyticsService.log

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    hostname: analytics-service
    status-page-url: http://analytics-service:8005/actuator/info
    health-check-url: http://analytics-service:8005/actuator/health
    home-page-url: http://analytics-service:8005/
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    app:
      name: ${spring.application.name}
      description: Analytics Service for Financial System

springdoc:
  api-docs:
    path: /api-docs
