# P1 overlay для тестовой среды (ADR-002 §2): MarketHistory + BotOptimization поверх P0.
#
# Запуск полного P1-стека:
#   cp .env.test-p1.example .env.test-p1
#   docker compose -f docker-compose.test.yml -f docker-compose.test-p1.yml --env-file .env.test-p1 up -d
#
# P0-only (без этого файла):
#   docker compose -f docker-compose.test.yml --env-file .env.test up -d

services:
  market-history-service:
    build:
      context: ./MarketHistoryService
      dockerfile: Dockerfile
    container_name: market-history-service-test
    ports:
      - "8010:8010"
    environment:
      SERVER_PORT: 8010
      JWT_SECRET: ${JWT_SECRET:-5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-test}
      SPRING_DATASOURCE_HOST: postgres
      SPRING_DATASOURCE_PORT: 5432
      SPRING_DATASOURCE_DATABASE: markethistorydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - financial-test-network
    depends_on:
      eureka-server:
        condition: service_started
      postgres:
        condition: service_healthy
      broker-integration-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot-optimization-service:
    build:
      context: ./BotOptimizationService
      dockerfile: Dockerfile
    container_name: bot-optimization-service-test
    ports:
      - "8011:8011"
    environment:
      SERVER_PORT: 8011
      JWT_SECRET: ${JWT_SECRET:-5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-test}
    networks:
      - financial-test-network
    depends_on:
      eureka-server:
        condition: service_started
      market-history-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  trading-bot-service:
    environment:
      # Профиль test — только для mvn/@SpringBootTest (Testcontainers). В Docker — default + test-p1.
      SPRING_PROFILES_ACTIVE: test-p1
      MARKET_HISTORY_CANDLES_ENABLED: "true"
    depends_on:
      market-history-service:
        condition: service_started
